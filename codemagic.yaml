workflows:
  # Smoke-test build: builds the iOS app without code signing on every push to
  # main and on PRs. Verifies the Capacitor wrap + Pods + Xcode project still
  # compile. No artifacts uploaded anywhere external.
  ios-debug:
    name: iOS Debug Build (no signing)
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      cocoapods: default
      node: 22
    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Install web dependencies
        script: |
          cd app
          npm ci
      - name: Build React web bundle
        script: |
          cd app
          npm run build
      - name: Capacitor sync
        script: |
          cd app
          npx cap sync ios
      - name: Install CocoaPods
        script: |
          cd app/ios/App
          pod install --repo-update
      - name: Build iOS (unsigned)
        script: |
          cd app/ios/App
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build
    artifacts:
      - app/ios/App/build/**/*.app
