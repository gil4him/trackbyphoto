workflows:
  # Smoke-test build: builds the iOS app without code signing. Useful for PRs
  # and any commit on main — verifies the Capacitor wrap + Pods + Xcode project
  # still compile. No artifacts uploaded anywhere.
  ios-debug:
    name: iOS Debug Build (no signing)
    instance_type: mac_mini_m2
    max_build_duration: 30
    environment:
      xcode: latest
      cocoapods: default
      node: 22
    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install web dependencies
        script: |
          cd app
          npm ci
      - name: Build React PWA
        script: |
          cd app
          npm run build
      - name: Capacitor sync
        script: |
          cd app
          npx cap sync ios
      - name: Install CocoaPods
        script: |
          cd app/ios/App
          pod install --repo-update
      - name: Build iOS (no signing)
        script: |
          cd app/ios/App
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build
    artifacts:
      - app/ios/App/build/**/*.app

  # TestFlight build: produces a signed .ipa and uploads to App Store Connect.
  # Requires Apple Developer Program credentials configured in Codemagic UI:
  #   - APP_STORE_CONNECT_PRIVATE_KEY, APP_STORE_CONNECT_KEY_IDENTIFIER,
  #     APP_STORE_CONNECT_ISSUER_ID, CERTIFICATE_PRIVATE_KEY
  # Trigger manually from the Codemagic UI (or via API) for now.
  ios-testflight:
    name: iOS TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      xcode: latest
      cocoapods: default
      node: 22
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.gil4him.trackbyphoto
      groups:
        - app_store_credentials
    scripts:
      - name: Install web dependencies
        script: |
          cd app
          npm ci
      - name: Build React PWA
        script: |
          cd app
          npm run build
      - name: Capacitor sync
        script: |
          cd app
          npx cap sync ios
      - name: Install CocoaPods
        script: |
          cd app/ios/App
          pod install --repo-update
      - name: Bump build number
        script: |
          cd app/ios/App
          BUILD_NUMBER=$(($(app-store-connect get-latest-app-store-build-number "$APP_STORE_APP_ID" 2>/dev/null || echo 0) + 1))
          agvtool new-version -all "$BUILD_NUMBER"
      - name: Build & archive
        script: |
          cd app/ios/App
          xcode-project use-profiles
          xcode-project build-ipa \
            --workspace App.xcworkspace \
            --scheme App
    artifacts:
      - app/ios/App/build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal Testers
